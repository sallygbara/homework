name: My First Workflow

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Say Hello
        run: echo "Hello GitHub Actions!"

      - name: Show Date
        run: date

      - name: List Files
        run: ls -la
       
